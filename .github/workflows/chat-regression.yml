name: Chat Regression

on:
  push:
  pull_request:

jobs:
  chat-regression:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./ci.db
      META_VERIFY_TOKEN: test-verify-token
      HAPPYBY_PAGE_ID: "127157417146065"
      STORE_SUPPORT_PHONE: "0701234567"
      STORE_SUPPORT_WHATSAPP: "0701234567"
      STORE_SUPPORT_HOURS: "9:00 AM to 6:00 PM"
      CHAT_TEST_PORT: "3100"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database schema
        run: npx prisma db push

      - name: Seed database
        run: node prisma/seed.js

      - name: Lint
        run: npm run lint

      - name: Run chat regression suite
        run: npm run test:chat
