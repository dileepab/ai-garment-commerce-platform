name: Process Comment Replies

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-comment-replies:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger comment reply queue
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://app.deez.lk/api/cron/comment-replies
